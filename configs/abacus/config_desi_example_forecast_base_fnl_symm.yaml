name: desi_example_forecast_base_fnl_symm

sim_params:
  #sim_name: "AbacusSummit_base_c000_ph000"
  sim_name_base: "AbacusSummit_base_c000_ph"
  z_mock: 0.5
  cleaned_halos: True
  sim_list: [0]
  ngrid: 576
  nthread: 128
  box: 2000
  interlaced: True
  compensated: True
  paste: 'TSC'
  samples: ['LRG', 'ELG']

# Power spectrum file paths
power_spectrum:
  main_directory: "../results/"
  #main_directory: "../results/"
  nonlinear: "nonlinear_power_abacus.txt"
  linear: "linear_power_abacus.txt"

# k-range parameters
k_range:
  kmin: 0.051
  kmax: 0.15
  k_samples: 150 #these are from kmin to kmax_analysis
  k_samples_extra: 400
  k_min_analysis: 0.001
  k_max_analysis: 0.35
  gauss_filter: False
  gauss_filter_kmax: 0.15

# Sampling parameters
sampling:
  Nsamples_base: 5000

# Physics parameters
physics:
  deltac: 1.42
  a1: 1.0
  a2: -0.8095238095
  Fg_factor: 17/21

# Bias parameters
#higher order bias parameters can be calculated from semi-analytical expressions/theory.
bias:
  b10_A: 1.6
  b10_B: 1.6
  b2_A: -0.3
  b2_B: -0.3

# Number density parameters
number_density:
  nbar_A: 3.3e-4
  nbar_B: 3.3e-4

# Keypairs for analysis
#specify quantity: "all", "Nfull", "Vfull", "T", "B", "Bcross"
#N for normalization, V for variance, T for trispectrum, B for bispectrum, Bcross for cross-shot bispectrum
keypairs:
  - [["g", "g"], ["N"]]
  - [["s", "s"], ["N"]]
  - [["t", "t"], ["N"]]
  - [["g", "s"], ["N"]]
  - [["g", "t"], ["N"]]
  - [["g", "ga"], ["N"]]
  - [["g", "sa"], ["N"]]
  - [["g", "ta"], ["N"]]
  - [["sa", "sa"], ["N"]]
  - [["c11", "c11"], ["N"]]
  - [["c01", "c01"], ["N"]]
  - [["c02", "c02"], ["N"]]
  - [["phiphi", "phiphi"], ["N"]]
  - [["g", "c11"], ["N"]]
  - [["g", "c01"], ["N"]]
  - [["g", "c02"], ["N"]]
  - [["g", "phiphi"], ["N"]]
  - [["g", "c11a"], ["N"]]
  - [["g", "c01a"], ["N"]]
  - [["g", "c02a"], ["N"]]
  - [["g", "phiphia"], ["N"]]
  

  
# Estimator keys
estimator_keys:
  - "n"
  - "g"
  - "s"
  - "t"

# Output configuration
output:
  directory: "../../results/"
  filename_prefix: "analysis" 