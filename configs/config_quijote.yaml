name: quijote_0000
# Power spectrum file paths
power_spectrum:
  nonlinear: "nonlinear_power_quijote.txt"
  linear: "linear_power_quijote.txt"

# Bias parameters
bias:
  b10_A: 1.0
  b10_B: 1.0
  b20_A: 0.0
  b20_B: 0.0
  bs2_A: 1.0
  bs2_B: 1.0
  bthetaA: 0.3
  bthetaB: 0.5
  brA: 1.0
  brB: 2.0

# Number density parameters
number_density:
  nbar_A: 3.3e-4
  nbar_B: 3.3e-4

# k-range parameters
k_range:
  kmin: 0.051
  kmax: 0.15
  k_samples: 100
  k_min_analysis: 0.001
  k_max_analysis: 0.05

# Sampling parameters
sampling:
  Nsamples_base: 10000

# Physics parameters
physics:
  deltac: 1.42
  a1: 1.0
  a2: -0.8095238095
  Fg_factor: 17/21

# Other parameters
other:
  epsilon: 1.0e-3

# Keypairs for analysis
keypairs:
  - ["x1", "n"]
  - ["x2", "n"]
  - ["n", "n"]
  - ["s", "n"]
  - ["g", "n"]
  - ["x", "n"]
  - ["t", "n"]
  - ["g", "g"]

# Estimator keys
estimator_keys:
  - "n"
  - "g"
  - "x"
  - "s"
  - "t"
  - "x2"

# Output configuration
output:
  directory: "results"
  filename_prefix: "analysis" 